name: Playwright tests

on:
  push:
    branches:
      - main
      - claude/mobile-first-dashboard-upABy
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install npm deps
        run: npm install

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy pyserial cryptography || true
          # Trainer can run with --mock and tolerates missing optional deps.

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify web/ ↔ monolith round-trip
        run: npm run build:check

      - name: Run Playwright smoke + API tests
        run: npx playwright test tests/smoke --project=desktop
        env:
          PYTHON: python
          RVT_TEST_PORT: 8989

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
