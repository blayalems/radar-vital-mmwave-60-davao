name: Deploy to GitHub Pages

# Publishes the dashboard PWA shell as a static site. The hosted shell talks to
# whatever trainer URL the user has paired (see S.apiBase in localStorage).
#
# Manual setup required (one-time):
#   Settings → Pages → Source: "GitHub Actions" (NOT "Deploy from a branch").
#   Without this, the deploy job fails fast (~4s) with no useful diagnostic.
#   See https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Build www/
        run: npm run build:web

      - name: Preserve latest release manifest
        if: github.event_name != 'pull_request'
        run: |
          manifest_url="https://blayalems.github.io/radar-vital-mmwave-60-davao/rvt-latest.json"
          if curl -fsSL "$manifest_url" -o www/rvt-latest.json; then
            echo "Preserved published rvt-latest.json in Pages artifact."
          else
            echo "No published rvt-latest.json found yet; release-artifacts.yml will publish it after the next release."
          fi

      - name: Verify repository-scoped static PWA output
        run: |
          test -f www/index.html
          test -f www/404.html
          test -f www/sw.js
          test -f www/radar_vital_live_dashboard_v12_for_v16_0.html
          grep -q '<app-root></app-root>' www/index.html
          grep -q '<app-root></app-root>' www/404.html
          ! grep -Eqi 'markdown-body|README[.]md' www/index.html
          cmp -s www/index.html www/404.html
          grep -q 'href="./manifest.webmanifest"' www/index.html
          grep -q '"id": "./"' www/manifest.webmanifest
          grep -q "const DASHBOARD = './index.html';" www/sw.js

      - name: Add CNAME and robots
        run: |
          # No custom domain by default; remove if/when one is added via repo settings.
          touch www/.nojekyll
          cat > www/robots.txt <<'EOF'
          User-agent: *
          Allow: /
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www

  deploy:
    # Pull-request preview builds only run the build job. Actual deploy to
    # github-pages only runs on push to main, after the build artifact is ready.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
