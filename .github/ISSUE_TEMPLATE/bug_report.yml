name: Bug report
description: Something in Radar Vital is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Tip: **Settings → Report an issue** inside the app
        pre-fills this form, including the diagnostics block below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: product_version
    attributes:
      label: Product version
      placeholder: "16.3.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - PWA (browser)
        - Android APK
        - Windows EXE
    validations:
      required: true
  - type: dropdown
    id: connection_mode
    attributes:
      label: Connection mode
      options:
        - Local EXE (bundled trainer)
        - LAN paired (phone/PWA to trainer)
        - Demo / sandbox
        - Unknown
    validations:
      required: false
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste the diagnostics JSON from Settings → Report an issue (optional — you can disable diagnostics in Settings).
      render: json
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal data (names, subject labels) from the text above.
          required: true
