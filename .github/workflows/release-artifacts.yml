name: Release APK and EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to publish, for example v16.0.1-alpha.1'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub Release as prerelease'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release_metadata:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_version: ${{ steps.version.outputs.release_version }}
      android_version_code: ${{ steps.version.outputs.android_version_code }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag and embedded native version
        id: version
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag_name }}
        run: |
          base_version="$(node -p "require('./src-tauri/tauri.conf.json').version.split('-')[0]")"
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            release_tag="v${base_version}-main.${GITHUB_RUN_NUMBER}"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$REQUESTED_TAG"
          else
            release_tag="$GITHUB_REF_NAME"
          fi
          release_version="${release_tag#v}"
          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must carry a semantic version, received: ${release_tag}" >&2
            exit 1
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=Radar Vital ${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "android_version_code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: release_metadata
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Build www/
        run: npm run build:web

      - name: Add Capacitor Android platform
        run: |
          npx cap add android || echo "android platform already exists"
          npx cap sync android
          node scripts/patch-android-shell.mjs

      - name: Stamp Android release version
        working-directory: android
        env:
          RELEASE_VERSION: ${{ needs.release_metadata.outputs.release_version }}
          ANDROID_VERSION_CODE: ${{ needs.release_metadata.outputs.android_version_code }}
        run: |
          sed -i -E "s/versionCode [0-9]+/versionCode ${ANDROID_VERSION_CODE}/" app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"${RELEASE_VERSION}\"/" app/build.gradle
          grep -E 'version(Code|Name)' app/build.gradle

      - name: Decode Android signing key
        id: android_signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release APK
        if: steps.android_signing.outputs.enabled == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file="$PWD/release.keystore" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          mkdir -p ../dist
          cp app/build/outputs/apk/release/*.apk ../dist/radar-vital-release.apk

      - name: Build debug APK fallback
        if: steps.android_signing.outputs.enabled != 'true'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          mkdir -p ../dist
          cp app/build/outputs/apk/debug/*.apk ../dist/radar-vital-debug.apk

      - name: Upload APK release asset
        uses: actions/upload-artifact@v4
        with:
          name: radar-vital-apk-release-asset
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  windows:
    name: Windows EXE
    runs-on: windows-latest
    timeout-minutes: 80
    needs: release_metadata
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-v12.txt

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Build www/
        run: npm run build:web

      - name: Build Python trainer sidecar
        shell: pwsh
        run: python scripts/build-trainer-sidecar.py --self-test

      - name: Stamp Windows release version
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.release_metadata.outputs.release_version }}
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.version = $env:RELEASE_VERSION
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath
          Write-Host "Tauri installer version: $($config.version)"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Build NSIS EXE installer
        run: cargo tauri build --verbose --bundles nsis
        env:
          RUST_BACKTRACE: '1'
          TAURI_BUNDLE__WEBVIEW_FIXED_RUNTIME_PATH: ''

      - name: Sign EXE when certificate is configured
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No NSIS EXE found to sign." }
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) {
            Write-Host "WINDOWS_CERTIFICATE_BASE64 not configured; leaving EXE unsigned."
            exit 0
          }
          [IO.File]::WriteAllBytes("$PWD\windows-signing.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found." }
          & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "$PWD\windows-signing.pfx" /p "$env:WINDOWS_CERTIFICATE_PASSWORD" $exe.FullName
          & $signtool.FullName verify /pa /v $exe.FullName

      - name: Stage EXE release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No NSIS EXE found." }
          Copy-Item $exe.FullName "dist\radar-vital-windows-installer.exe"

      - name: Upload EXE release asset
        uses: actions/upload-artifact@v4
        with:
          name: radar-vital-exe-release-asset
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release_metadata
      - android
      - windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f -maxdepth 3 -print

      - name: Prepare dist directory for generator
        run: |
          mkdir -p dist
          cp release-assets/radar-vital-apk-release-asset/*.apk dist/
          cp release-assets/radar-vital-exe-release-asset/*.exe dist/

      - name: Generate latest release manifest JSON
        run: node scripts/generate-rvt-latest.mjs

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_metadata.outputs.release_tag }}
          name: ${{ needs.release_metadata.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.ref == 'refs/heads/main' || inputs.prerelease || startsWith(github.ref_name, 'v16.0.1-alpha') }}
          make_latest: false
          generate_release_notes: true
          body: |
            Installable APK and standalone Windows EXE generated from `${{ github.sha }}`.

            The Windows installer includes the bundled Python trainer sidecar. APK builds remain LAN companion clients that connect to a trainer over Wi-Fi/LAN.

            Automated `main` releases use a monotonically increasing `v<app-version>-main.<workflow-run>` version. GitHub-generated release notes below are the changelog for this build.
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.apk
            release-assets/**/*.exe
            dist/rvt-latest.json

      - name: Push rvt-latest.json to gh-pages branch
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          
          # Clone the gh-pages branch
          if git clone --depth 1 --branch gh-pages "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" temp-gh-pages; then
            cp dist/rvt-latest.json temp-gh-pages/
            cd temp-gh-pages
            git add rvt-latest.json
            if ! git diff --cached --quiet; then
              git commit -m "Deploy rvt-latest.json for ${{ needs.release_metadata.outputs.release_tag }}"
              git push origin gh-pages
            else
              echo "No changes to rvt-latest.json"
            fi
          else
            echo "gh-pages branch does not exist. Creating orphan branch..."
            mkdir temp-gh-pages
            cd temp-gh-pages
            git init
            git checkout --orphan gh-pages
            cp ../dist/rvt-latest.json ./
            git add rvt-latest.json
            git commit -m "Initial commit of rvt-latest.json"
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
            git push -u origin gh-pages
          fi