name: PR64 cleanup temporary automation

on:
  push:
    branches:
      - claude/operator-console-a11y-i18n
    paths:
      - .github/workflows/pr64-commit-windows-baselines.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/operator-console-a11y-i18n

      - name: Remove temporary PR64 automation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/pr64-apply-port-fix.yml \
            .github/workflows/pr64-finalize-visuals.yml \
            .github/workflows/pr64-commit-windows-baselines.yml \
            scripts/pr64-fix-port-option.mjs
          git commit -m "chore(ci): remove temporary PR64 automation"
          git pull --rebase origin claude/operator-console-a11y-i18n
          git push origin HEAD:claude/operator-console-a11y-i18n
