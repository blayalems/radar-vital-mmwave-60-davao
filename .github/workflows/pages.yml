name: Deploy to GitHub Pages

# Publishes the dashboard PWA shell as a static site. The hosted shell talks to
# whatever trainer URL the user has paired (see S.apiBase in localStorage).
#
# Manual setup required (one-time):
#   Settings → Pages → Source: "GitHub Actions" (NOT "Deploy from a branch").
#   Without this, the deploy job fails fast (~4s) with no useful diagnostic.
#   See https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Build www/
        run: npm run build:web

      - name: Add CNAME and robots
        run: |
          # No custom domain by default; remove if/when one is added via repo settings.
          touch www/.nojekyll
          cat > www/robots.txt <<'EOF'
          User-agent: *
          Allow: /
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www

  deploy:
    # Pull-request preview builds only run the build job. Actual deploy to
    # github-pages only runs on push to main, after the build artifact is ready.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
