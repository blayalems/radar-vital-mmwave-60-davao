name: PR64 refresh generated dashboard

on:
  push:
    branches:
      - claude/operator-console-a11y-i18n
    paths:
      - .github/workflows/pr64-refresh-generated.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/operator-console-a11y-i18n

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Validate source and generate dashboard
        run: |
          npm run test:unit:web
          npm run build:web
          npm run build:check

      - name: Commit generated dashboard
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radar_vital_live_dashboard_v12_for_v16_0.html
          if git diff --cached --quiet; then
            echo "Generated dashboard is already current."
            exit 0
          fi
          git commit -m "build(web): refresh generated dashboard"
          git push origin HEAD:claude/operator-console-a11y-i18n
