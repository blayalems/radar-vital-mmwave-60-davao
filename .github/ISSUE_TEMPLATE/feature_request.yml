name: Feature request
description: Suggest an improvement to Radar Vital
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or friction does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: platform_scope
    attributes:
      label: Platform scope
      multiple: true
      options:
        - PWA
        - Android APK
        - Windows EXE
        - Trainer (Python)
        - Firmware
    validations:
      required: false
  - type: checkboxes
    id: thesis
    attributes:
      label: Thesis relevance
      options:
        - label: This supports the thesis evaluation/defense timeline.
          required: false
