<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Radar Vital Trainer — Operator Console</title>
  
  <meta name="description" content="Dashboard-first console for trustworthy radar vital-sign monitoring sessions. Configure hardware, run preflight checks, monitor live telemetry, and review ML-readiness verdicts.">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#0b1220">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Radar Vital">
  
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" href="./icons/icon-192.png">
  <base href="./">
  <link rel="stylesheet" href="./fonts/rvt-fonts.css" data-rvt-runtime-fonts>
</head>
<body>
  <div id="rvtLoadingOverlay">
    <div class="rvt-loader-brand">
      <div class="rvt-loader-mark"></div>
      <span class="rvt-loader-title">Radar Vital</span>
    </div>
    <span class="rvt-loader-sub">Operator Console</span>
    <div class="rvt-loader-bar-track">
      <div class="rvt-loader-bar" id="rvtLoaderBar"></div>
    </div>
    <span class="rvt-loader-status" id="rvtLoaderStatus">Initializing console…</span>
  </div>

  <app-root></app-root>

  <script>
    (function() {
      const overlay = document.getElementById('rvtLoadingOverlay');
      const loaderBar = document.getElementById('rvtLoaderBar');
      const loaderStatus = document.getElementById('rvtLoaderStatus');
      let progress = 10;
      let interval = setInterval(() => {
        if (progress < 90) {
          progress += Math.floor(Math.random() * 15) + 5;
          if (loaderBar) loaderBar.style.width = Math.min(progress, 90) + '%';
          if (loaderStatus) {
            if (progress < 30) loaderStatus.textContent = 'Loading system components…';
            else if (progress < 60) loaderStatus.textContent = 'Initializing telemetry engine…';
            else loaderStatus.textContent = 'Securing connection environment…';
          }
        }
      }, 150);

      let removed = false;
      function removeOverlay() {
        if (removed) return;
        removed = true;
        clearInterval(interval);
        if (loaderBar) loaderBar.style.width = '100%';
        if (loaderStatus) loaderStatus.textContent = 'Console ready';
        
        // Hide Capacitor SplashScreen dynamically (A1)
        try {
          const cap = window.Capacitor;
          if (cap && cap.isNativePlatform() && cap.Plugins && cap.Plugins.SplashScreen) {
            cap.Plugins.SplashScreen.hide();
          }
        } catch (e) {
          console.warn('[SplashScreen] Failed to hide:', e);
        }

        setTimeout(() => {
          if (overlay) {
            overlay.classList.add('fade-out');
            setTimeout(() => {
              if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
            }, 600);
          }
        }, 200);
      }

      window.addEventListener('load', () => {
        Promise.all([
          document.fonts ? document.fonts.ready : Promise.resolve()
        ]).then(removeOverlay);
      });

      // Hard fallback timeout of 8 seconds to prevent permanent lockout
      setTimeout(removeOverlay, 8000);
    })();
  </script>
</body>
</html>
