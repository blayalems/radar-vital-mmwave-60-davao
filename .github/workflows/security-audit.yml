name: Security Audit (advisory)

# Non-blocking supply-chain audit. This surfaces known CVEs in our Python and
# npm dependency trees without gating merges/releases: every audit step uses
# continue-on-error so the job reports findings but never turns the build red.
# Treat its output as a triage signal, not a hard gate.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Python dependency audit -------------------------------------
      # pip-audit checks our pinned requirements against the PyPI advisory
      # database. Advisory only: continue-on-error keeps it from failing CI.
      - name: Install pip-audit
        run: python -m pip install --upgrade pip-audit

      - name: pip-audit (requirements.txt + requirements-v12.txt)
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt -r requirements-v12.txt

      # --- npm dependency audit ----------------------------------------
      # npm audit at --audit-level=high only reports high/critical advisories.
      # Run for the root package tree and the Angular web/ package tree.
      # Both are advisory: continue-on-error so neither blocks the build.
      - name: npm audit (root)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: npm audit (web)
        continue-on-error: true
        run: npm --prefix web audit --audit-level=high
