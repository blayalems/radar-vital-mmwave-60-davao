name: Deploy to GitHub Pages

# Publishes the dashboard PWA shell as a static site. The hosted shell talks to
# whatever trainer URL the user has paired (see S.apiBase in localStorage).
# Triggered on every push to main, and manually via workflow_dispatch.

on:
  push:
    branches:
      - main
      - claude/mobile-first-dashboard-upABy
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build www/
        run: npm run build:web

      - name: Add CNAME and robots
        run: |
          # No custom domain by default; remove if/when one is added via repo settings.
          touch www/.nojekyll
          cat > www/robots.txt <<EOF
          User-agent: *
          Allow: /
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
