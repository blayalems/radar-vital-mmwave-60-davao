name: Playwright tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-v12.txt

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-v12.txt

      - name: Verify trainer package imports
        # Catches breakage in rvt_trainer/ package boundary that would otherwise
        # surface as a fast Playwright webServer-start failure with no diagnostic.
        run: |
          python -m compileall -q radar_vital_trainer_v12_for_v16_0.py rvt_trainer
          python radar_vital_trainer_v12_for_v16_0.py --help > /dev/null
          python -m rvt_trainer --help > /dev/null

      - name: Run Python contract and unit tests
        run: python -m pytest tests -v

      - name: Run Angular unit tests
        run: npm run test:unit:web

      - name: Validate release manifest generator
        run: node scripts/generate-rvt-latest.mjs --self-test

      - name: Verify web/ ↔ monolith round-trip on main
        if: github.event_name != 'pull_request'
        run: npm run build:check

      - name: Build web bundle for PR smoke tests
        if: github.event_name == 'pull_request'
        run: npm run build:web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright smoke + API tests across supported viewports
        shell: bash
        run: |
          set -euo pipefail

          run_project() {
            local project="$1"
            local port="$2"
            local state_root=".playwright-state/sessions-${project}"
            local output_dir="test-results/smoke-${project}"
            local report_dir="playwright-report/${project}"

            mkdir -p "${state_root}" "${output_dir}" "${report_dir}"
            echo "Starting Playwright smoke project ${project} on port ${port}"
            PYTHON=python3 \
            RVT_TEST_PORT="${port}" \
            RVT_TEST_SESSIONS_ROOT="${state_root}" \
            PLAYWRIGHT_HTML_REPORT="${report_dir}" \
              npx playwright test tests/smoke --project="${project}" --output="${output_dir}" &
            pids+=("$!")
          }

          pids=()
          run_project desktop 8989
          run_project pixel-7 8991
          run_project iphone-14 8992
          run_project ipad 8993

          failed=0
          for pid in "${pids[@]}"; do
            if ! wait "${pid}"; then
              failed=1
            fi
          done

          exit "${failed}"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual:
    name: Visual regression (committed Windows baselines)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-v12.txt

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-v12.txt

      - name: Verify web/ ↔ monolith round-trip on main
        if: github.event_name != 'pull_request'
        run: npm run build:check

      - name: Build web bundle for PR visual tests
        if: github.event_name == 'pull_request'
        run: npm run build:web

      - name: Install Playwright browsers
        run: npx playwright install chromium webkit

      - name: Run visual regression across themes and supported viewports
        run: npx playwright test tests/visual
        env:
          PYTHON: python
          RVT_TEST_PORT: 8990

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 7
