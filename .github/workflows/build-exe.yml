name: Build Windows EXE (Tauri)

on:
  push:
    branches:
      - main
    paths:
      - 'radar_vital_live_dashboard_v12_for_v16_0.html'
      - 'web/**'
      - 'assets/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build-exe.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'assets/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install npm deps
        run: npm ci

      - name: Build www/
        run: npm run build:web

      - name: Diagnostic preflight
        shell: pwsh
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          Get-ChildItem www | Select-Object -First 10

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Build MSI + NSIS installers
        # --verbose surfaces real bundle errors; the 14-min failure on PR #5
        # head ran to MSI bundling without any diagnostic. Bundle list is
        # comma-separated per Tauri v2 CLI.
        run: cargo tauri build --verbose --bundles msi,nsis
        env:
          # downloadBootstrapper minimizes installer size; the bootstrapper fetches WebView2 at install time on Win10.
          TAURI_BUNDLE__WEBVIEW_FIXED_RUNTIME_PATH: ''

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: radar-vital-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
