name: PR64 unit diagnostics

on:
  push:
    branches:
      - claude/operator-console-a11y-i18n
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/operator-console-a11y-i18n

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Run Angular unit tests and capture output
        id: unit
        shell: bash
        run: |
          set +e
          npm run test:unit:web > ci-unit.log 2>&1
          status=$?
          cat ci-unit.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log on failure
        if: steps.unit.outputs.status != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-unit.log
          git commit -m "chore(ci): capture PR64 unit failure"
          git push origin HEAD:claude/operator-console-a11y-i18n

      - name: Fail when unit tests failed
        if: steps.unit.outputs.status != '0'
        shell: bash
        run: exit 1
