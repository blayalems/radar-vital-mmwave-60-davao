name: PR64 finalize visuals

on:
  push:
    branches:
      - claude/operator-console-a11y-i18n
    paths:
      - .github/workflows/pr64-finalize-visuals.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/operator-console-a11y-i18n

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-v12.txt

      - name: Apply Radar Port fallback fix
        run: node scripts/pr64-fix-port-option.mjs

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci
          python -m pip install --upgrade pip
          pip install -r requirements-v12.txt

      - name: Warm matplotlib font cache
        run: python -c "import matplotlib.pyplot"

      - name: Validate and generate dashboard
        run: |
          npm run test:unit:web
          npm run build:web
          npm run build:check

      - name: Install Playwright browsers
        run: npx playwright install chromium webkit

      - name: Refresh committed Windows visual baselines
        run: npx playwright test tests/visual --update-snapshots
        env:
          PYTHON: python
          RVT_TEST_PORT: 8990

      - name: Commit functional fix, generated dashboard, and baselines
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/app/components/home/home.component.html
          git add radar_vital_live_dashboard_v12_for_v16_0.html
          git add tests/visual
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Nothing changed."
            exit 0
          fi
          git commit -m "fix(web): preserve configured radar port and refresh visuals"
          git push origin HEAD:claude/operator-console-a11y-i18n
