name: PR64 review follow-ups

on:
  push:
    branches:
      - claude/operator-console-a11y-i18n
    paths:
      - .github/workflows/pr64-review-followups.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/operator-console-a11y-i18n

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-v12.txt

      - name: Apply review follow-ups
        run: node scripts/pr64-review-followups.mjs

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci
          python -m pip install --upgrade pip
          pip install -r requirements-v12.txt

      - name: Warm matplotlib font cache
        run: python -c "import matplotlib.pyplot"

      - name: Run source, contrast, and Angular unit checks
        run: npm run test:unit:web

      - name: Generate and verify standalone dashboard
        run: |
          npm run build:web
          npm run build:check

      - name: Install Playwright browsers
        run: npx playwright install chromium webkit

      - name: Run smoke and API coverage
        run: npx playwright test tests/smoke
        env:
          PYTHON: python
          RVT_TEST_PORT: 8990

      - name: Refresh and verify Windows visual baselines
        run: npx playwright test tests/visual --update-snapshots
        env:
          PYTHON: python
          RVT_TEST_PORT: 8990

      - name: Commit validated follow-ups
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(a11y): close contrast and i18n review gaps"
          git pull --rebase origin claude/operator-console-a11y-i18n
          git push origin HEAD:claude/operator-console-a11y-i18n
