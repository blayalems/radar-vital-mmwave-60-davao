name: Build Windows EXE (Tauri)

on:
  push:
    branches:
      - main
      - 'codex/**'
    paths:
      - 'radar_vital_live_dashboard_v12_for_v16_0.html'
      - 'web/**'
      - 'assets/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build-exe.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Build www/
        run: npm run build:web

      - name: Diagnostic preflight
        shell: pwsh
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          Get-ChildItem www | Select-Object -First 10

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Print Tauri CLI version
        run: cargo tauri --version

      - name: Compile-only (no bundling)
        # Surfaces Rust/Tauri compile errors separately from WiX/NSIS bundling
        # errors. The 14-min PR #5 failure could've been at compile time, link
        # time, or bundle time — splitting these out tells us which.
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --verbose
        env:
          RUST_BACKTRACE: '1'

      - name: Build NSIS EXE installer
        # This workflow is the EXE release gate. Do not continue on error:
        # a green run must produce a Windows .exe installer.
        run: cargo tauri build --verbose --bundles nsis
        env:
          RUST_BACKTRACE: '1'
          TAURI_BUNDLE__WEBVIEW_FIXED_RUNTIME_PATH: ''

      - name: List bundled EXE
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          if (Test-Path $nsisDir) { Get-ChildItem $nsisDir } else { Write-Host "no nsis/" }
          $exeCount = if (Test-Path $nsisDir) { (Get-ChildItem $nsisDir -Filter *.exe -ErrorAction SilentlyContinue).Count } else { 0 }
          if ($exeCount -eq 0) { exit 1 }

      - name: Upload EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: radar-vital-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
