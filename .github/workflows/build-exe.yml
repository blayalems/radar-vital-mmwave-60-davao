name: Build Windows EXE (Tauri)

on:
  push:
    branches:
      - main
      - 'codex/**'
      - 'gpt55/**'
    paths:
      - 'web/**'
      - 'assets/**'
      - 'rvt_trainer/**'
      - 'radar_vital_trainer_v12_for_v16_0.py'
      - 'requirements*.txt'
      - 'radar_vital_v16_*.ino'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build-exe.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # This job installs both the root deps and the Angular web deps
          # (npm --prefix web ci), so key the npm cache on BOTH lockfiles.
          # A root-only key would never bust when only web/ deps change.
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-v12.txt

      # Keep the EXE gate on the locally verified packaging toolchain. The
      # app Cargo.lock pins Tauri transitive deps so CI does not float to the
      # time 0.3.48 / tauri-utils 2.9.2 coherence break.
      - uses: dtolnay/rust-toolchain@1.94.1

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Build www/
        run: npm run build:web

      - name: Build Python trainer sidecar
        shell: pwsh
        run: python scripts/build-trainer-sidecar.py --self-test

      - name: Diagnostic preflight
        shell: pwsh
        run: |
          node --version
          npm --version
          python --version
          rustc --version
          cargo --version
          Get-ChildItem www | Select-Object -First 10
          Get-ChildItem src-tauri/binaries | Select-Object -First 10

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Print Tauri CLI version
        run: cargo tauri --version

      - name: Run native transport, BLE, and sidecar contract tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --verbose

      - name: Compile-only (no bundling)
        # Surfaces Rust/Tauri compile errors separately from NSIS bundling
        # errors. Sidecar binary already exists, so this also catches native
        # code regressions before the expensive installer stage.
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --verbose
        env:
          RUST_BACKTRACE: '1'

      - name: Disable updater artifacts for unsigned CI installer
        shell: pwsh
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.bundle.createUpdaterArtifacts = $false
          if ($config.plugins -and $config.plugins.updater) {
            $config.plugins.updater.pubkey = ""
          }
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath
          Write-Host "Updater artifacts disabled for PR/push installer build."

      - name: Build NSIS EXE installer
        # This workflow is the EXE release gate. Do not continue on error:
        # a green run must produce a Windows .exe installer with sidecar.
        run: cargo tauri build --verbose --bundles nsis
        env:
          RUST_BACKTRACE: '1'
          TAURI_BUNDLE__WEBVIEW_FIXED_RUNTIME_PATH: ''

      - name: List bundled EXE
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          if (Test-Path $nsisDir) { Get-ChildItem $nsisDir } else { Write-Host "no nsis/" }
          $exeCount = if (Test-Path $nsisDir) { (Get-ChildItem $nsisDir -Filter *.exe -ErrorAction SilentlyContinue).Count } else { 0 }
          if ($exeCount -eq 0) { exit 1 }

      - name: Upload EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: radar-vital-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
