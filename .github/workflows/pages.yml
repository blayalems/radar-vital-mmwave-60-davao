name: Deploy to GitHub Pages

# Publishes the dashboard PWA shell as a static site. The hosted shell talks to
# whatever trainer URL the user has paired (see S.apiBase in localStorage).
#
# Manual setup required (one-time):
#   Settings → Pages → Source: "GitHub Actions" (NOT "Deploy from a branch").
#   Without this, the deploy job fails fast (~4s) with no useful diagnostic.
#   See https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'assets/**'
      - 'PRIVACY.md'
      - 'TERMS.md'
      - 'docs/privacy.html'
      - 'docs/terms.html'
      - 'docs/wiki/**'
      - 'docs/milestones.md'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'assets/**'
      - 'PRIVACY.md'
      - 'TERMS.md'
      - 'docs/privacy.html'
      - 'docs/terms.html'
      - 'docs/wiki/**'
      - 'docs/milestones.md'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Installs root deps (npm ci) and web deps (npm --prefix web ci),
          # so include both lockfiles in the npm cache key.
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Build www/
        run: npm run build:web

      - name: Publish stable legal pages
        run: |
          cp docs/privacy.html www/privacy.html
          cp docs/terms.html www/terms.html

      - name: Preserve latest release manifest
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          manifest_url="https://blayalems.github.io/radar-vital-mmwave-60-davao/rvt-latest.json"
          dest="www/rvt-latest.json"

          # Distinguish three cases so a transient blip never silently ships an
          # artifact that drops the live manifest:
          #   200  -> keep the fetched file (happy path).
          #   404  -> manifest not published yet; proceed without it (OK).
          #   other/network errors -> retry, then fail the step on persistence.
          attempts=3
          status=""
          for attempt in $(seq 1 "$attempts"); do
            # -w prints only the final HTTP status; -o writes the body to dest.
            # No -f here: we want to inspect the status code ourselves rather
            # than let curl collapse every failure into a single exit code.
            status="$(curl -sS -w '%{http_code}' -o "$dest" "$manifest_url" || echo '000')"
            echo "Attempt ${attempt}/${attempts}: HTTP ${status} for ${manifest_url}"

            if [ "$status" = "200" ]; then
              echo "Preserved published rvt-latest.json in Pages artifact."
              exit 0
            fi

            if [ "$status" = "404" ]; then
              # Legitimate "not published yet" — remove the 404 body we wrote and
              # proceed. release-artifacts.yml publishes it after the next release.
              rm -f "$dest"
              echo "No published rvt-latest.json found yet (404); release-artifacts.yml will publish it after the next release."
              exit 0
            fi

            # Transient/network/5xx: discard the partial body and back off.
            rm -f "$dest"
            echo "Transient error fetching manifest (HTTP ${status}); retrying after backoff..."
            sleep $(( attempt * 3 ))
          done

          echo "::error::Failed to fetch ${manifest_url} after ${attempts} attempts (last HTTP ${status}). Refusing to ship Pages artifact without the live manifest."
          exit 1

      - name: Verify repository-scoped static PWA output
        run: |
          test -f www/index.html
          test -f www/404.html
          test -f www/sw.js
          test -f www/privacy.html
          test -f www/terms.html
          test -f www/radar_vital_live_dashboard_v12_for_v16_0.html
          grep -q '<app-root></app-root>' www/index.html
          grep -q '<app-root></app-root>' www/404.html
          grep -q 'Radar Vital Privacy Notice' www/privacy.html
          grep -q 'Radar Vital Terms and Conditions' www/terms.html
          grep -q 'DRAFT 2026-06-12.1' www/privacy.html
          grep -q 'DRAFT 2026-06-12.1' www/terms.html
          grep -q 'radar-vital-mmwave-60-davao/privacy.html' www/privacy.html
          grep -q 'radar-vital-mmwave-60-davao/terms.html' www/terms.html
          ! grep -Eqi 'markdown-body|README[.]md' www/index.html
          cmp -s www/index.html www/404.html
          grep -q 'href="./manifest.webmanifest"' www/index.html
          grep -q '"id": "./"' www/manifest.webmanifest
          grep -q "const DASHBOARD = './index.html';" www/sw.js

      - name: Add CNAME and robots
        run: |
          # No custom domain by default; remove if/when one is added via repo settings.
          touch www/.nojekyll
          cat > www/robots.txt <<'EOF'
          User-agent: *
          Allow: /
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www

  deploy:
    # Pull-request preview builds only run the build job. Actual deploy to
    # github-pages only runs on push to main, after the build artifact is ready.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
