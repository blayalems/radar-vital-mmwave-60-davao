name: Build Android APK (Capacitor)

on:
  push:
    branches:
      - main
      - 'codex/**'
    paths:
      - 'web/**'
      - 'assets/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Build www/
        run: npm run build:web

      - name: Diagnostic preflight
        run: |
          node --version
          npm --version
          java -version
          npx cap --version
          ls -la www/ | head -20

      - name: Add Capacitor Android platform
        run: |
          npx cap add android || echo "android platform already exists"
          npx cap sync android
          node scripts/patch-android-shell.mjs

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: radar-vital-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
