name: Playwright tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-v12.txt

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-v12.txt

      - name: Verify trainer package imports
        # Catches breakage in rvt_trainer/ package boundary that would otherwise
        # surface as a fast Playwright webServer-start failure with no diagnostic.
        run: |
          python -m compileall -q radar_vital_trainer_v12_for_v16_0.py rvt_trainer
          python radar_vital_trainer_v12_for_v16_0.py --help > /dev/null
          python -m rvt_trainer --help > /dev/null

      - name: Run Python contract and unit tests
        run: python -m pytest tests -v

      - name: Verify web/ ↔ monolith round-trip
        run: npm run build:check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke + API tests across supported viewports
        run: npx playwright test tests/smoke
        env:
          PYTHON: python3
          RVT_TEST_PORT: 8989

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual:
    name: Visual regression (committed Windows baselines)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-v12.txt

      - name: Install npm deps
        run: npm ci

      - name: Install Angular web dependencies
        run: npm --prefix web ci

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-v12.txt

      - name: Verify web/ ↔ monolith round-trip
        run: npm run build:check

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run visual regression across themes and supported viewports
        run: npx playwright test tests/visual
        env:
          PYTHON: python
          RVT_TEST_PORT: 8990

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 7
