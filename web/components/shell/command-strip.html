      <div class="command-strip" aria-label="Search and quick actions">

          <span class="material-symbols-rounded" aria-hidden="true">search</span>
          <span class="cmd-label">Search commands, help, and shortcuts</span>
          <kbd>Ctrl K</kbd>

        <button class="quick-action" type="button" onclick="runPreflightBatch()"

          aria-label="Export JSON payload"><kbd>E</kbd><span class="qa-label">Export</span></button>
      </div>
