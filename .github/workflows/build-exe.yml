name: Build Windows EXE (Tauri)

on:
  push:
    branches:
      - main
      - claude/mobile-first-dashboard-upABy
    paths:
      - 'radar_vital_live_dashboard_v12_for_v16_0.html'
      - 'assets/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'scripts/**'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install npm deps
        run: npm install

      - name: Build www/
        run: npm run build:web

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Build MSI + NSIS installers
        run: cargo tauri build --bundles msi nsis
        env:
          # downloadBootstrapper minimizes installer size; the bootstrapper fetches WebView2 at install time on Win10.
          TAURI_BUNDLE__WEBVIEW_FIXED_RUNTIME_PATH: ''

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: radar-vital-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
